<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU 100 // GLITCH-CORE VAULT</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-pink: #ff00ff;
            --neon-blue: #00f3ff;
            --bg-black: #050505;
            --card-gray: #111;
            --bay: #5c3a21;
            --chestnut: #a0522d;
            --grey: #808080;
            --black: #000000;
            --brown: #3d2b1f;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Glitch Header --- */
        header {
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            background: linear-gradient(45deg, #111, #000);
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            color: var(--neon-green);
            text-shadow: 2px 2px var(--neon-pink);
            animation: glitch-text 3s infinite;
        }

        #finder {
            margin-top: 20px;
            background: black;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 20px;
            width: 300px;
            text-transform: uppercase;
            outline: none;
        }

        /* --- Breeding Bay --- */
        #breeding-bay {
            background: #000;
            border: 2px dashed var(--neon-pink);
            margin: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200px;
        }

        #legacy-output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid white;
            background: #111;
        }

        /* --- Vault Grid --- */
        #vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .horse-card {
            background: var(--card-gray);
            padding: 15px;
            position: relative;
            cursor: pointer;
            border: 1px solid #333;
            clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
            transition: transform 0.1s, border-color 0.2s;
        }

        .horse-card:hover {
            border-color: var(--neon-green);
            transform: scale(1.02);
        }

        .horse-card.selected {
            border: 2px solid var(--neon-pink);
            background: #1a001a;
        }

        /* Color-Coded Glitch Borders */
        .bay { border-left: 8px solid var(--bay); }
        .chestnut { border-left: 8px solid var(--chestnut); }
        .grey { border-left: 8px solid var(--grey); }
        .black { border-left: 8px solid var(--black); }
        .brown { border-left: 8px solid var(--brown); }

        .rank {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.8rem;
            color: #666;
        }

        .name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }

        .stats { font-size: 0.7rem; color: #aaa; line-height: 1.5; }
        .stats b { color: var(--neon-green); }

        /* --- Animations --- */
        @keyframes glitch-text {
            0% { transform: translate(0); }
            2% { transform: translate(-5px, 2px); skewX(10deg); }
            4% { transform: translate(5px, -2px); skewX(-10deg); }
            6% { transform: translate(0); }
        }

        .legacy-svg {
            width: 300px;
            height: 300px;
            filter: contrast(150%) brightness(120%);
        }

        /* --- Racing Mode --- */
        #racing-bay {
            display: none;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a001a 100%);
            border: 3px solid var(--neon-green);
            margin: 20px;
            padding: 30px;
            min-height: 500px;
        }

        #racing-bay.active {
            display: block;
        }

        .race-header {
            text-align: center;
            color: var(--neon-green);
            font-size: 2rem;
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 30px;
            animation: glitch-text 2s infinite;
        }

        .race-track {
            background: linear-gradient(90deg, #000 0%, #111 50%, #000 100%);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .race-lane {
            display: flex;
            align-items: center;
            height: 60px;
            margin: 15px 0;
            background: rgba(0, 255, 65, 0.05);
            border-left: 2px dashed var(--neon-pink);
            position: relative;
            overflow: hidden;
        }

        .horse-name {
            min-width: 180px;
            color: var(--neon-blue);
            font-weight: bold;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .race-bar {
            flex: 1;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green) 0%, var(--neon-pink) 100%);
            position: relative;
            max-width: 0;
            transition: max-width 0.1s linear;
            clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .race-position {
            min-width: 40px;
            text-align: right;
            color: var(--neon-pink);
            font-weight: bold;
            margin-left: 10px;
        }

        .race-controls {
            text-align: center;
            margin: 30px 0;
        }

        .race-button {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .race-button:hover {
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(1.05);
        }

        .race-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .race-results {
            margin-top: 30px;
            padding: 20px;
            background: #111;
            border: 1px solid var(--neon-pink);
            color: var(--neon-green);
            text-align: center;
            display: none;
        }

        .race-results.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .winner-title {
            font-size: 1.5rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin: 15px 0;
        }

        .tab-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .tab-button {
            background: #111;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .tab-button.active {
            background: var(--neon-green);
            color: black;
            border-color: var(--neon-green);
        }

        .tab-button:hover {
            border-color: var(--neon-green);
        }

        #breeding-bay.hide {
            display: none;
        }

        #vault-grid.hide {
            display: none;
        }

        #descendants-list {
            margin: 20px 0;
        }
    </style>
</head>

<header>

let bornRacers = [];
let selection = [];
const grid = document.getElementById('vault-grid');
const legacyOutput = document.getElementById('legacy-output');
const status = document.getElementById('selection-status');
const breedingBay = document.getElementById('breeding-bay');
const racingBay = document.getElementById('racing-bay');

function render(list) {
    grid.innerHTML = '';
    list.forEach(h => {
        const card = document.createElement('div');
        card.className = `horse-card ${h.color}`;
        const isDescendant = h.rank > 100 ? ' [RACER]' : '';
        card.innerHTML = `
            <div class="rank">ID_${h.rank.toString().padStart(3, '0')}${isDescendant}</div>
            <div class="name">${h.name}</div>
            <div class="stats">
                SIRE: <b>${h.sire}</b><br>
                DAM: <b>${h.dam}</b><br>
                COAT: <b>${h.color.toUpperCase()}</b>
            </div>
        `;
        card.onclick = () => selectHorse(h, card);
        grid.appendChild(card);
    });
}

function selectHorse(horse, el) {
    if (selection.includes(horse)) {
        selection = selection.filter(h => h !== horse);
        el.classList.remove('selected');
    } else if (selection.length < 2) {
        selection.push(horse);
        el.classList.add('selected');
    }

    if (selection.length === 2) {
        generateLegacy(selection[0], selection[1]);
    } else {
        legacyOutput.innerHTML = '';
        status.innerText = "SELECT TWO LEGENDS TO BREED DESCENDANT";
    }
}

function generateLegacy(p1, p2) {
    const legacyName = (p1.name.substring(0, 4) + p2.name.substring(p2.name.length - 4)).toUpperCase();
    const newRacer = {
        rank: 100 + bornRacers.length + 1,
        name: legacyName,
        color: Math.random() > 0.5 ? p1.color : p2.color,
        sire: p1.name,
        dam: p2.name,
        isDescendant: true,
        speed: Math.floor(Math.random() * 100) + p1.rank + p2.rank
    };
    
    bornRacers.push(newRacer);
    status.innerText = `✓ RACER SYNTHESIZED: ${legacyName} - NOW AVAILABLE IN ARENA!`;
    
    // Generative SVG Glitch Logic
    const color1 = getComputedStyle(document.documentElement).getPropertyValue(`--neon-blue`).trim();
    const color2 = getComputedStyle(document.documentElement).getPropertyValue(`--neon-pink`).trim();
    
    const svg = `
        <svg viewBox="0 0 200 200" class="legacy-svg" xmlns="http://www.w3.org/2000/svg">
            <filter id="glitch">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
            </filter>
            <rect width="100%" height="100%" fill="#000" />
            <g filter="url(#glitch)">
                <circle cx="100" cy="100" r="60" stroke="${color1}" stroke-width="2" fill="none" opacity="0.6" />
                <rect x="50" y="50" width="100" height="100" stroke="${color2}" stroke-width="1" fill="none" />
                <path d="M 20 100 L 180 100 M 100 20 L 100 180" stroke="white" stroke-width="0.5" />
                <text x="50%" y="90%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="10" font-family="monospace">
                    RACER: ${legacyName}
                </text>
                <text x="50%" y="96%" dominant-baseline="middle" text-anchor="middle" fill="${color1}" font-size="6">
                    BRED: ${p1.rank} x ${p2.rank}
                </text>
            </g>
        </svg>
    `;
    legacyOutput.innerHTML = svg;
    
    // Update racing bay with new racers
    updateDescendantsList();
}

function updateDescendantsList() {
    const listDiv = document.getElementById('descendants-list');
    if (bornRacers.length === 0) {
        listDiv.innerHTML = '<p style="color: var(--neon-pink); text-align: center; margin: 20px 0;">NO RACERS BRED YET. BREED DESCENDANTS TO RACE!</p>';
        return;
    }
    
    let html = '<div style="color: var(--neon-green); text-align: center; margin: 20px 0;"><strong>🏁 AVAILABLE RACERS (Total: ' + bornRacers.length + '):</strong></div><div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px;">';
    
    bornRacers.forEach((racer, idx) => {
        html += `<div style="background: #111; border: 1px solid var(--neon-pink); padding: 10px; text-align: center; color: var(--neon-blue);">
            <strong>${racer.name}</strong><br><small style="color: var(--neon-green);">⚡ Speed: ${racer.speed}</small><br><small style="color: #888;">ID: ${racer.rank}</small>
        </div>`;
    });
    
    html += '</div>';
    listDiv.innerHTML = html;
}

render(horseData);

// Tab switching
document.querySelectorAll('.tab-button').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (tab === 'racing') {
            breedingBay.classList.add('hide');
            racingBay.classList.add('active');
            grid.classList.add('hide');
            document.getElementById('finder').style.display = 'none';
            updateDescendantsList();
        } else {
            breedingBay.classList.remove('hide');
            racingBay.classList.remove('active');
            grid.classList.remove('hide');
            document.getElementById('finder').style.display = 'block';
        }
    });
});

// Racing functionality
document.getElementById('start-race-btn').addEventListener('click', startRace);
document.getElementById('reset-race-btn').addEventListener('click', resetRace);

function startRace() {
    if (bornRacers.length === 0) {
        alert('BREED SOME RACERS FIRST!');
        return;
    }
    
    const raceTrack = document.getElementById('race-track');
    const raceResults = document.getElementById('race-results');
    
    raceTrack.innerHTML = '';
    raceResults.classList.remove('show');
    raceResults.innerHTML = '';
    
    document.getElementById('start-race-btn').disabled = true;
    document.getElementById('reset-race-btn').disabled = true;
    
    // Create race lanes
    const racers = [...bornRacers].sort(() => Math.random() - 0.5); // Randomize order
    const raceLanes = {};
    
    racers.forEach(racer => {
        raceLanes[racer.name] = { racer, progress: 0, speed: racer.speed + Math.random() * 50 };
        
        const lane = document.createElement('div');
        lane.className = 'race-lane';
        lane.innerHTML = `
            <div class="horse-name">${racer.name}</div>
            <div class="race-bar" id="bar-${racer.name}"></div>
            <div class="race-position" id="pos-${racer.name}">0%</div>
        `;
        raceTrack.appendChild(lane);
    });
    
    // Animate race
    const raceInterval = setInterval(() => {
        let finished = 0;
        const finishLine = 100;
        
        Object.keys(raceLanes).forEach(name => {
            const lane = raceLanes[name];
            lane.progress += lane.speed / 100;
            
            if (lane.progress > finishLine) {
                lane.progress = finishLine;
                finished++;
            }
            
            const bar = document.getElementById(`bar-${name}`);
            const pos = document.getElementById(`pos-${name}`);
            bar.style.maxWidth = lane.progress + '%';
            pos.innerText = Math.min(100, Math.floor(lane.progress)) + '%';
        });
        
        if (finished === racers.length) {
            clearInterval(raceInterval);
            showRaceResults(racers, raceLanes);
            document.getElementById('start-race-btn').disabled = false;
            document.getElementById('reset-race-btn').disabled = false;
        }
    }, 50);
}

function showRaceResults(racers, raceLanes) {
    const sorted = racers.sort((a, b) => raceLanes[b.name].progress - raceLanes[a.name].progress);
    const raceResults = document.getElementById('race-results');
    
    let html = '<div class="winner-title">🏆 RACE COMPLETE 🏆</div>';
    sorted.forEach((racer, idx) => {
        const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '  ';
        html += `<div style="margin: 10px 0; color: var(--neon-green);">${medal} ${idx + 1}. <strong>${racer.name}</strong> (Speed: ${racer.speed})</div>`;
    });
    
    raceResults.innerHTML = html;
    raceResults.classList.add('show');
}

function resetRace() {
    document.getElementById('race-track').innerHTML = '';
    document.getElementById('race-results').classList.remove('show');
    document.getElementById('race-results').innerHTML = '';
}

// Search functionality
document.getElementById('finder').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = horseData.filter(h => 
        h.name.toLowerCase().includes(term) || h.rank.toString() === term
    );
    render(filtered);
});
</script>
